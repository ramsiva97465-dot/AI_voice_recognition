[providers]
python = "3.11"

[variables]
NIXPACKS_NO_CACHE = "1"
NO_CACHE = "1"

[phases.setup]
aptPkgs = ["ffmpeg", "libsndfile1", "libgomp1", "gcc", "g++", "libpq-dev"]

[phases.install]
cmds = [
    "python -m venv /opt/venv",
    ". /opt/venv/bin/activate",
    "pip install --upgrade pip",
    "pip install --no-cache-dir --index-url https://download.pytorch.org/whl/cpu torch==2.2.2 torchaudio==2.2.2",
    "pip install --no-cache-dir -r requirements.txt"
]

[start]
cmd = ". /opt/venv/bin/activate && uvicorn app.main:app --host 0.0.0.0 --port $PORT"
